# Judge0 CE configuration
# These values are used by both the judge0 server/worker AND postgres/redis containers

# PostgreSQL
POSTGRES_HOST=judge0-db
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0_secret_pw

# Redis (used internally by judge0)
REDIS_HOST=judge0-redis
REDIS_PASSWORD=judge0_redis_pw

# Judge0 settings
COUNT_TIME_IN_QUEUE=true
MAINTENANCE_MODE=false

# Use per-process limits instead of cgroups (cgroup v1 not available on macOS Docker Desktop)
ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT=true
ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT=true
